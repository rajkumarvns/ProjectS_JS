<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <header class="bg-primary text-light p-3 text-center">
      <h1>To Do List</h1>
    </header>
    <main>
      <div class="container rounded shadow d-flex my-2 border gap-4 p-3">
        <input
          type="text"
          name="newTask"
          id="newTask"
          placeholder="Enter a new task"
          class="form-control w-75 "
        />
        <button class=" btn btn-primary w-25 d-flex gap-3 justify-content-center align-items-center" onclick="addNewTask()">
          <i class="bi bi-plus-circle-fill"></i> Add New Task
        </button>
      </div>
      <div class="container rounded shadow d-flex my-2 d-none p-3" id="taskDiv">
        <ol id="taskList">
          <!-- <li class="d-flex align-items-center my-3">
            <span>Task1</span>
            <button
              class="btn btn-danger ms-4 d-flex gap-3 align-items-center justify-content-center"
            >
              <i class="bi bi-trash3"></i>Delete
            </button>
          </li> -->
        </ol>
      </div>
    </main>
    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
